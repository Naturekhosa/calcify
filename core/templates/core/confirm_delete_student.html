<h1>Confirm Delete</h1>

<p>
    Are you sure you want to permanently delete
    <strong>{{ student.first_name }} {{ student.last_name }}</strong>
    ({{ student.username }})?
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<p>
    <a href="{% url 'manage_students' %}">Cancel</a>
</p>
