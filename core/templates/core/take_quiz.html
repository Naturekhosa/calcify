<h1>{{ quiz.title }}</h1>

<form method="post">
    {% csrf_token %}

    {% for question in questions %}
        <div>
            <p><strong>{{ question.question_text }}</strong></p>

            {% for choice in question.choices.all %}
                <label>
                    <input type="radio" name="{{ question.id }}" value="{{ choice.id }}">
                    {{ choice.choice_text }}
                </label><br>
            {% endfor %}
        </div>
        <hr>
    {% endfor %}

    <button type="submit">Submit Quiz</button>
</form>
