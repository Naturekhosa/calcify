<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ quiz.title }} | Calcify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 via-slate-50 to-purple-50 min-h-screen text-gray-800">

<div class="max-w-3xl mx-auto px-6 py-8">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-blue-700">
            {{ quiz.title }}
        </h1>
        <p class="text-slate-600 mt-2">
            Answer all questions and submit your quiz.
        </p>
    </div>

    <!-- Quiz Form -->
    <form method="post" class="space-y-6">
        {% csrf_token %}

        {% for question in questions %}
        <div class="bg-white border border-blue-100 rounded-2xl shadow-sm p-6">

            <!-- Question -->
            <p class="font-semibold text-lg text-slate-900 mb-4">
                {{ forloop.counter }}. {{ question.question_text }}
            </p>

            <!-- Choices -->
            <div class="space-y-3">
                {% for choice in question.choices.all %}
                <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 transition">

                    <input 
                        type="radio" 
                        name="{{ question.id }}" 
                        value="{{ choice.id }}"
                        class="w-4 h-4 text-blue-600 focus:ring-blue-500"
                    >

                    <span class="text-slate-800">
                        {{ choice.choice_text }}
                    </span>

                </label>
                {% endfor %}
            </div>

        </div>
        {% endfor %}

        <!-- Submit Button -->
        <div class="pt-4">
            <button type="submit"
                class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold rounded-xl hover:opacity-90 transition shadow-md">
                Submit Quiz
            </button>
        </div>

    </form>

</div>

</body>
</html>
