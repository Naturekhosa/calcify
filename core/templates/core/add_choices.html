<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add MCQ Choices | Calcify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<div class="max-w-3xl mx-auto p-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-blue-700">Add MCQ Choices</h1>
            <p class="text-sm text-gray-600">Provide answer options and select the correct one</p>
        </div>

        <a href="{% url 'manage_quizzes' %}"
           class="inline-block px-4 py-2 bg-white text-blue-700 border border-blue-200 rounded-lg shadow hover:bg-blue-50 transition">
            ← Back to Manage Quizzes
        </a>
    </div>

    <!-- Question Card -->
    <div class="bg-white p-6 rounded-xl shadow-md border mb-6">
        <p class="text-sm text-gray-600 mb-2">Question</p>
        <p class="text-lg font-semibold text-gray-800">
            {{ question.question_text }}
        </p>
    </div>

    <!-- Form -->
    <div class="bg-white p-6 rounded-xl shadow-md border">
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Choices -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Choice 1</label>
                <input type="text" name="choice1" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Choice 2</label>
                <input type="text" name="choice2" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Choice 3</label>
                <input type="text" name="choice3" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Choice 4</label>
                <input type="text" name="choice4" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Correct Choice -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Correct Answer</label>
                <select name="correct_choice" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">-- Select Correct Choice --</option>
                    <option value="1">Choice 1</option>
                    <option value="2">Choice 2</option>
                    <option value="3">Choice 3</option>
                    <option value="4">Choice 4</option>
                </select>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'manage_quizzes' %}"
                   class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    Cancel
                </a>

                <button type="submit"
                        class="px-5 py-2 bg-blue-700 text-white rounded-lg shadow hover:bg-blue-800 transition">
                    Save Choices
                </button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
