<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | Calcify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    /* Make all inputs clearly visible */
    input, select, textarea {
        width: 100%;
        padding: 12px 14px;
        border: 2px solid #cbd5e1;
        border-radius: 10px;
        background-color: #ffffff;
        color: #0f172a;
        font-size: 14px;
        outline: none;
        transition: all 0.2s ease;
    }

    /* Focus state */
    input:focus, select:focus, textarea:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    /* Labels */
    label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #334155;
    }

    /* Django spacing */
    form p {
        margin-bottom: 16px;
    }

    /* Textarea (important for quiz descriptions) */
    textarea {
        min-height: 180px;
        line-height: 1.6;
    }
</style>
</head>

<body class="bg-gray-100 text-gray-800">

<div class="max-w-3xl mx-auto p-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-blue-700">{{ page_title }}</h1>
            <p class="text-sm text-gray-600">Create or edit a quiz and its settings</p>
        </div>

        <a href="{% url 'manage_quizzes' %}"
           class="inline-block px-4 py-2 bg-white text-blue-700 border border-blue-200 rounded-lg shadow hover:bg-blue-50 transition">
            ← Back to Manage Quizzes
        </a>
    </div>

    <!-- Form Card -->
    <div class="bg-white p-6 rounded-xl shadow-md border">

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Django Form -->
            <div class="space-y-4">
                {{ form.as_p }}
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'manage_quizzes' %}"
                   class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    Cancel
                </a>

                <button type="submit"
                        class="px-5 py-2 bg-blue-700 text-white rounded-lg shadow hover:bg-blue-800 transition">
                    Save Quiz
                </button>
            </div>
        </form>

    </div>

</div>

</body>
</html>
