<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | Calcify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<div class="max-w-3xl mx-auto p-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-blue-700">{{ page_title }}</h1>
            <p class="text-sm text-gray-600">Add or edit a quiz question</p>
        </div>

        <a href="{% url 'manage_quizzes' %}"
           class="inline-block px-4 py-2 bg-white text-blue-700 border border-blue-200 rounded-lg shadow hover:bg-blue-50 transition">
            ← Back to Manage Quizzes
        </a>
    </div>

    <!-- Quiz Info -->
    <div class="bg-white p-5 rounded-xl shadow-md border mb-6">
        <p class="text-sm text-gray-600">Quiz</p>
        <p class="text-lg font-semibold text-gray-800">{{ quiz.title }}</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white p-6 rounded-xl shadow-md border">

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Question Text -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ form.question_text.label }}
                </label>
                {{ form.question_text }}
            </div>

            <!-- Question Type -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ form.question_type.label }}
                </label>
                {{ form.question_type }}
            </div>

            <!-- Marks -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ form.marks.label }}
                </label>
                {{ form.marks }}
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'manage_quizzes' %}"
                   class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    Cancel
                </a>

                <button type="submit"
                        class="px-5 py-2 bg-blue-700 text-white rounded-lg shadow hover:bg-blue-800 transition">
                    Save Question
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
