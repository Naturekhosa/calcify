<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Calcify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-gray-800 min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">
        <div class="bg-white border border-slate-300 rounded-2xl shadow-sm p-8">

            <div class="text-center mb-8">
                <p class="text-sm font-semibold tracking-wide text-blue-600 uppercase mb-2">
                    Calcify
                </p>
                <h2 class="text-3xl font-bold text-slate-900">Login</h2>
                <p class="text-sm text-slate-600 mt-2">
                    Sign in to continue to your account
                </p>
            </div>

            {% if form.errors %}
                <div class="mb-5 px-4 py-3 rounded-xl border border-red-300 bg-red-50 text-red-700 text-sm">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">
                        Username
                    </label>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        required
                        class="w-full px-4 py-3 border-2 border-gray-400 bg-white rounded-xl text-gray-900 placeholder-gray-400 shadow-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-200 outline-none"
                    >
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">
                        Password
                    </label>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        required
                        class="w-full px-4 py-3 border-2 border-gray-400 bg-white rounded-xl text-gray-900 placeholder-gray-400 shadow-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-200 outline-none"
                    >
                </div>

                <button type="submit"
                        class="w-full px-4 py-3 bg-blue-700 text-white font-medium rounded-xl hover:bg-blue-800 transition">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="text-blue-700 font-medium hover:underline">
                        Register as student
                    </a>
                </p>
            </div>

            <div class="mt-4 text-center">
                <a href="{% url 'home' %}" class="text-sm text-slate-500 hover:text-blue-700 transition">
                    ← Back to Home
                </a>
            </div>

        </div>
    </div>

</body>
</html>
