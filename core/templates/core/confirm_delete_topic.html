<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Topic | Calcify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen">

<div class="max-w-md w-full p-6">

    <!-- Card -->
    <div class="bg-white p-6 rounded-xl shadow-md border text-center">

        <!-- Title -->
        <h1 class="text-xl font-bold text-red-600 mb-4">
            Confirm Delete Topic
        </h1>

        <!-- Message -->
        <p class="text-gray-700 mb-4">
            Are you sure you want to delete the topic
        </p>

        <p class="text-lg font-semibold text-gray-900 mb-4">
            {{ topic.name }}
        </p>

        <!-- Warning -->
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
            <p class="text-sm text-red-600 font-medium">
                ⚠ Warning: This will also delete all lessons under this topic.
            </p>
        </div>

        <p class="text-sm text-red-500 mb-6">
            This action cannot be undone.
        </p>

        <!-- Actions -->
        <form method="post" class="flex justify-center gap-4">
            {% csrf_token %}

            <a href="{% url 'manage_lessons' %}"
               class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                Cancel
            </a>

            <button type="submit"
                    class="px-5 py-2 bg-red-600 text-white rounded-lg shadow hover:bg-red-700 transition">
                Yes, Delete
            </button>
        </form>

    </div>

</div>

</body>
</html>
