<h1>Confirm Delete Topic</h1>

<p>
    Are you sure you want to delete the topic
    <strong>{{ topic.name }}</strong>?
</p>

<p>
    Warning: deleting this topic will also delete all lessons under it.
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete Topic</button>
</form>

<p><a href="{% url 'manage_lessons' %}">Cancel</a></p>
