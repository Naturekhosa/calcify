<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Calcify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-gray-800 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8">

            <div class="text-center mb-8">
                <p class="text-sm font-semibold tracking-wide text-blue-600 uppercase mb-2">
                    Calcify
                </p>
                <h2 class="text-3xl font-bold text-slate-900">Login</h2>
                <p class="text-sm text-slate-600 mt-2">
                    Sign in to continue to your account
                </p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div class="space-y-4">
                    {{ form.as_p }}
                </div>

                <button type="submit"
                        class="w-full px-4 py-3 bg-blue-700 text-white font-medium rounded-xl hover:bg-blue-800 transition">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="text-blue-700 font-medium hover:underline">
                        Register as student
                    </a>
                </p>
            </div>

            <div class="mt-4 text-center">
                <a href="{% url 'home' %}" class="text-sm text-slate-500 hover:text-blue-700 transition">
                    ← Back to Home
                </a>
            </div>

        </div>
    </div>

</body>
</html>
